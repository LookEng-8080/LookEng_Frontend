<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LookEng — 로그인</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/login.css" />
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <div class="login-page">
    <div class="stars" id="stars"></div>

    <div class="login-card">
      <!-- 로고 -->
      <div class="login-card__logo">
        <div class="login-logo-badge">
          <div class="login-logo-badge__gloss"></div>
          <div class="login-logo-badge__content">
            <span>L</span>
            <span class="logo-eye-slot" id="logoEye"></span>
            <span class="logo-eye-slot" id="logoEye2"></span>
            <span>kEng</span>
          </div>
        </div>
        <p class="login-card__tagline">영어 단어 학습 플랫폼</p>
      </div>

      <!-- 기능 탭: 로그인 | 회원가입 -->
      <div class="login-card__func-tabs">
        <button class="func-tab is-active" data-func="login">로그인</button>
        <button class="func-tab" data-func="signup">회원가입</button>
      </div>

      <!-- 유형 탭: 학생 | 관리자 (회원가입 탭일 때만 표시) -->
      <div class="login-card__role-tabs" id="roleTabs" hidden>
        <button class="role-tab is-active" data-role="student">학생</button>
        <button class="role-tab" data-role="admin">관리자</button>
      </div>

      <!-- 로그인 폼 -->
      <div id="loginSection" style="width: 100%;">
        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label class="form-group__label" for="loginEmail">이메일</label>
            <input type="email" class="input" id="loginEmail" placeholder="example@email.com" autocomplete="email" />
          </div>
          <div class="form-group">
            <label class="form-group__label" for="loginPassword">비밀번호</label>
            <input type="password" class="input" id="loginPassword" placeholder="비밀번호 입력" autocomplete="current-password" />
            <p class="form-group__error" id="loginError"></p>
          </div>
          <div class="login-form__submit">
            <button type="submit" class="btn btn--primary btn--full" id="loginBtn">로그인</button>

            <div style="margin-top: 15px; width: 100%; display: flex; justify-content: center;">
              <div id="googleLoginBtn"></div>
            </div>

            <div style="text-align: center; margin-top: 15px;">
              <button type="button" id="showResetBtn" style="color: #888; background: none; border: none; font-size: 14px; text-decoration: underline; cursor: pointer;">비밀번호를 잊어버리셨나요?</button>
            </div>
          </div>
        </form>
      </div>

      <div id="resetSection" style="display: none; width: 100%;">
        <h2 style="font-size: 18px; margin-bottom: 10px; color: #333; text-align: center;">비밀번호 재설정</h2>
        <p style="font-size: 13px; color: #666; text-align: center; margin-bottom: 20px;">가입하신 이메일로 인증번호를 보내드립니다.</p>
        
        <form id="resetRequestForm">
          <div class="form-group">
            <label class="form-group__label">이메일 주소</label>
            <input type="email" id="resetEmail" class="input" placeholder="example@lookeng.com" required>
          </div>
          <button type="submit" id="sendCodeBtn" class="btn btn--primary btn--full">인증번호 발송</button>
        </form>

        <form id="resetConfirmForm" style="display: none; margin-top: 20px; border-top: 1px dashed #e0e0e0; padding-top: 20px;">
          <div class="form-group">
            <label class="form-group__label">인증번호 (5자리)</label>
            <input type="text" id="resetToken" class="input" placeholder="인증번호 5자리" maxlength="5" required>
          </div>
          <div class="form-group">
            <label class="form-group__label">새 비밀번호</label>
            <input type="password" id="newPassword" class="input" placeholder="새 비밀번호" required>
          </div>
          <div class="form-group">
            <label class="form-group__label">새 비밀번호 확인</label>
            <input type="password" id="confirmPassword" class="input" placeholder="새 비밀번호 다시 입력" required>
          </div>
          <button type="submit" class="btn btn--secondary btn--full" style="margin-top: 10px;">비밀번호 변경 완료</button>
        </form>

        <div style="text-align: center; margin-top: 20px;">
          <button type="button" id="showLoginBtn" style="color: #888; background: none; border: none; font-size: 14px; text-decoration: underline; cursor: pointer;">로그인 화면으로 돌아가기</button>
        </div>
      </div>

      <!-- 회원가입 폼 -->
      <form class="login-form" id="signupForm" hidden>
        <div class="form-group">
          <label class="form-group__label" for="signupEmail">이메일</label>
          <input type="email" class="input" id="signupEmail" placeholder="example@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label class="form-group__label" for="signupNickname">닉네임</label>
          <input type="text" class="input" id="signupNickname" placeholder="닉네임 입력 (최대 50자)" maxlength="50" autocomplete="nickname" />
        </div>

        <div class="form-group" id="adminCodeGroup" hidden>
          <label class="form-group__label" for="signupAdminCode">관리자 코드</label>
          <input type="password" class="input" id="signupAdminCode" placeholder="관리자 전용 가입 코드를 입력하세요" autocomplete="off" />
        </div>
        
        <div class="form-group">
          <label class="form-group__label" for="signupPassword">비밀번호</label>
          <input type="password" class="input" id="signupPassword" placeholder="비밀번호 입력" autocomplete="new-password" />
        </div>
        <div class="form-group">
          <label class="form-group__label" for="signupPasswordConfirm">비밀번호 확인</label>
          <input type="password" class="input" id="signupPasswordConfirm" placeholder="비밀번호 재입력" autocomplete="new-password" />
          <p class="form-group__error" id="signupError"></p>
        </div>
        <div class="login-form__submit">
          <button type="submit" class="btn btn--primary btn--full" id="signupBtn">회원가입</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="../js/pages/login.js"></script>
</body>
</html>
