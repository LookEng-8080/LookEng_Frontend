<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>테스트 세션 관리 - LookEng</title>
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/pages/admin.css" />
  <link rel="stylesheet" href="../../css/pages/test.css" />
</head>
<body>
  <div class="layout">
    <div class="layout__sidebar" id="sidebar"></div>

    <main class="layout__main">
      <div class="admin-page-header">
        <h2 class="page-title">테스트 관리</h2>
      </div>

      <!-- 유저 그리드 -->
      <div class="user-grid" id="userGrid"></div>
    </main>
  </div>

  <!-- 유저 테스트 기록 모달 -->
  <div class="modal-overlay" id="sessionsModal">
    <div class="modal modal--wide">
      <div class="modal__header">
        <h2 class="modal__title" id="modalUserName"></h2>
        <button class="modal__close" id="modalClose">✕</button>
      </div>
      <div class="modal__body">
        <div class="session-list" id="sessionList"></div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--primary" id="modalCloseBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 세션 상세 모달 -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal modal--detail">
      <div class="modal__header">
        <h2 class="modal__title" id="detailModalTitle">테스트 상세</h2>
        <button class="modal__close" id="detailModalClose">✕</button>
      </div>
      <div class="modal__body">
        <div class="detail-summary" id="detailSummary"></div>
        <div class="test-history-table-wrapper" style="margin-top:16px">
          <table class="data-table">
            <thead>
              <tr>
                <th>#</th><th>영단어</th><th>뜻</th><th>내 답안</th><th>결과</th>
              </tr>
            </thead>
            <tbody id="detailAnswerBody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--primary" id="detailModalCloseBtn">닫기</button>
      </div>
    </div>
  </div>

  <script type="module" src="../../js/pages/admin/quiz-session.js"></script>
</body>
</html>
