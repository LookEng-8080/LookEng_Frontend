<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단어장 관리 - LookEng</title>
  <link rel="stylesheet" href="../../css/global.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../../css/pages/admin.css" />
</head>
<body>
  <div class="layout">
    <div class="layout__sidebar" id="sidebar"></div>

    <main class="layout__main">
      <!-- 헤더 -->
      <div class="admin-page-header">
        <h2 class="page-title">단어장 관리</h2>
        <button class="btn btn--primary" id="addWordBtn">+ 새 단어 추가</button>
      </div>

      <!-- 단어 리스트 -->
      <ul class="word-list" id="wordList"></ul>

      <!-- 페이지네이션 -->
      <div class="pagination-wrapper" id="pagination"></div>
    </main>
  </div>

  <!-- 단어 추가/수정 모달 -->
  <div class="modal-overlay" id="wordModal">
    <div class="modal">
      <div class="modal__header">
        <h2 class="modal__title" id="modalTitle">단어 추가</h2>
        <button class="modal__close" id="modalClose">✕</button>
      </div>
      <div class="modal__body">
        <div class="form-group">
          <label class="form-group__label">영단어 <span style="color:var(--color-danger)">*</span></label>
          <input type="text" class="input" id="fieldEnglish" placeholder="예: abandon" />
        </div>
        <div class="form-group">
          <label class="form-group__label">뜻 (한글) <span style="color:var(--color-danger)">*</span></label>
          <input type="text" class="input" id="fieldMeaning" placeholder="예: 포기하다" />
        </div>
        <div class="form-group">
          <label class="form-group__label">품사</label>
          <div class="pos-buttons" id="posButtons"></div>
        </div>
        <div class="form-group">
          <label class="form-group__label">예문</label>
          <textarea class="input" id="fieldExample" rows="2" placeholder="예문을 입력하세요."></textarea>
        </div>
      </div>
      <div class="modal__footer">
        <button class="btn btn--ghost" id="cancelBtn">취소</button>
        <button class="btn btn--primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <script type="module" src="../../js/pages/admin/word-manage.js"></script>
</body>
</html>
