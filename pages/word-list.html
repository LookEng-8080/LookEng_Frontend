<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LookEng — 단어장</title>
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/pages/word-list.css" />
</head>
<body>
  <div class="layout">
    <div class="layout__sidebar" id="sidebar"></div>

    <main class="layout__main">
      <!-- 헤더 -->
      <div class="page-header">
        <h1 class="page-title">단어장 <span class="page-title__hint">카드를 클릭하면 뜻을 볼 수 있어요</span></h1>
        <button class="btn btn--primary" id="addWordBtn" hidden>+ 새 단어 추가</button>
      </div>

      <!-- 학습 진도 바 -->
      <div class="progress-section">
        <div class="progress-section__header">
          <span class="progress-section__label">학습 진도</span>
          <span class="progress-level-badge" id="progressLevel">Lv.1</span>
        </div>
        <div class="progress-bar">
          <div class="progress-bar__fill" id="progressFill" style="width: 0%"></div>
        </div>
        <div class="progress-section__footer">
          <span class="progress-section__count" id="progressCount">암기완료 0 / 0</span>
          <span class="progress-section__next" id="progressNext">다음 등급까지 10개</span>
        </div>
      </div>

      <!-- 검색창 -->
      <div class="search-bar">
        <div class="search-bar__inner">
          <svg class="search-bar__icon" viewBox="0 0 20 20" fill="none" aria-hidden="true">
            <circle cx="9" cy="9" r="6" stroke="currentColor" stroke-width="1.8"/>
            <path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
          </svg>
          <input
            type="search"
            class="search-bar__input"
            id="searchInput"
            placeholder="영어 또는 한글로 검색"
            autocomplete="off"
          />
          <button class="search-bar__clear" id="searchClear" hidden aria-label="검색 초기화">✕</button>
        </div>
      </div>

      <!-- 필터 탭 -->
      <div class="filter-tabs" id="filterTabs">
        <button class="filter-tab filter-tab--active" data-filter="all">전체</button>
        <button class="filter-tab" data-filter="bookmarked">★ 북마크</button>
        <button class="filter-tab" data-filter="memorized">✓ 암기완료</button>
      </div>

      <!-- 컨트롤 바 -->
      <div class="controls" id="controls">
        <span id="totalCount" style="font-size:0.875rem;color:var(--color-text-secondary)"></span>
        <select class="sort-select" id="sortSelect">
          <option value="english,asc">A → Z</option>
          <option value="english,desc">Z → A</option>
        </select>
      </div>

      <!-- 단어 카드 그리드 -->
      <div class="word-grid" id="wordGrid"></div>

      <!-- 페이지네이션 -->
      <div class="pagination-wrapper" id="pagination"></div>
    </main>
  </div>

  <script type="module" src="../js/pages/word-list.js"></script>
</body>
</html>
