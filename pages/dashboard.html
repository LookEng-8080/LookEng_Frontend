<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 - LookEng</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/word-list.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>
<body>
  <div class="layout">
    <div class="layout__sidebar" id="sidebar"></div>

    <main class="layout__main">
      <div class="dashboard-grid">
        
        <section class="welcome-card card">
          <h1 class="welcome-card__title">환영합니다! <span id="userName">User</span>님, 오늘도 달려볼까요? 🚀</h1>
          <div class="dashboard-actions">
            <a href="./test.html" class="btn btn--primary btn--lg">테스트 시작하기</a>
            <a href="./word-list.html" class="btn btn--secondary btn--lg">단어장 보기</a>
          </div>
        </section>

        <section class="level-section card">
          <h2 class="section-title">나의 등급</h2>
          <div class="level-display">
            <div class="level-badge-wrap">
              <span class="level-badge" id="levelBadge">Lv.1</span>
            </div>
            <div class="level-info">
              <div class="level-progress-bar">
                <div class="level-progress-bar__fill" id="levelProgressFill" style="width: 0%"></div>
              </div>
              <div class="level-info__texts">
                <span id="levelMemorized">암기완료 0 / 50</span>
                <span id="levelNext">다음 등급까지 10개</span>
              </div>
            </div>
          </div>
        </section>

        <section class="learning-record-section card">
          <h2 class="section-title">나의 학습 기록</h2>
          <div class="grass-calendar-wrapper">
            <div id="grassCalendarContainer"></div>
            <!--  깃허브 스타일 커스텀 툴팁 -->
            <div id="grassTooltip" class="grass-tooltip"></div>
          </div>
        </section>

        <section class="feature-guide-section">
          <a href="./word-list.html" class="feature-card card">
            <h3 class="feature-card__title">단어장</h3>
            <p class="feature-card__desc">TOEIC 빈출 단어 카드를 플립해 뜻을 확인하고, 암기완료 · 북마크로 나만의 학습 리스트를 관리하세요.</p>
          </a>
          <a href="./test.html" class="feature-card card">
            <h3 class="feature-card__title">단어 테스트</h3>
            <p class="feature-card__desc">주관식 · 객관식 · 빈칸채우기 중 원하는 유형을 골라 실력을 점검하고, 틀린 단어는 상세 기록에서 바로 복습하세요.</p>
          </a>
        </section>

      </div>
    </main>
  </div>

  <script type="module" src="../js/pages/dashboard.js"></script>
</body>
</html>
