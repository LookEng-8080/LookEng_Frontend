<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 - LookEng</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/word-list.css">
  <link rel="stylesheet" href="../css/pages/dashboard.css">
</head>
<body>
  <div class="layout">
    
    
    <div class="layout__sidebar" id="sidebar"></div>

    <main class="layout__main">
      <div class="dashboard-grid">
        
        <!-- 좌측 컬럼: 메인 영역 -->
        <div class="dashboard-grid__left">
          
          <section class="welcome-card card">
            <p class="welcome-card__greeting">환영합니다!</p>
            <h1 class="welcome-card__title"><span id="userName">백송현</span>님, 오늘도 달려볼까요? 🚀</h1>
            <p class="welcome-card__subtitle">오늘의 목표까지 단 <strong>7단어</strong> 남았습니다.</p>

            <div class="welcome-progress">
              <div class="welcome-progress__header">
                <span>오늘의 학습 진행도</span>
                <span class="welcome-progress__text">8 / 15</span>
              </div>
              <div class="progress-bar">
                <div class="progress-bar__fill" style="width: 53%;"></div>
              </div>
            </div>

            <div class="welcome-actions">
              <a href="./test.html" class="btn btn--primary">▶ 퀴즈 시작하기</a>
              <a href="./word-list.html" class="btn btn--secondary">단어장 보기</a>
            </div>
          </section>

          <section class="master-progress-card card">
            <h2>단어장 마스터 진행도</h2>
            <div class="master-progress__header">
              <span id="currentLevelText">Lv.1 (현재 외운 단어)</span>
              <span class="master-progress__count"><span id="progressText">0 / 0</span> 개 (Lv.5)</span>
            </div>
            <div class="progress-bar">
              <div class="progress-bar__fill progress-bar__fill--success" id="progressFill" style="width: 0%;"></div>
            </div>
          </section>

        </div>

        <!-- 우측 컬럼: 요약 영역 -->
        <div class="dashboard-grid__right">
          
          <section class="grade-card card card--navy">
            <div class="grade-stats">
              <div class="grade-stat">
                <span class="grade-stat__label">현재 등급</span>
                <strong class="grade-stat__value">
                  <span id="gradeEmoji">🥇</span> <span id="gradeLabel" style="color: #FFD700;">골드</span>
                </strong>
              </div>
              <div class="grade-stat grade-stat--right">
                <span class="grade-stat__label">누적 포인트</span>
                <strong class="grade-stat__value">855 P</strong>
              </div>
            </div>
            <div class="streak-box">
              <span class="streak-box__icon">🔥</span>
              <div class="streak-box__text">
                <strong>14일 연속 학습 중!</strong>
                <p>스트릭을 유지하고 보너스 P를 받으세요.</p>
              </div>
            </div>
          </section>

        </div>
      </div>
    </main>
  </div>

  <script type="module" src="../js/pages/dashboard.js"></script>
</body>
</html>
